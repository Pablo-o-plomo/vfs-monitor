# nixpacks.toml — Railway build config
# Устанавливает системные зависимости Chromium для Playwright

[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "nss",
  "nspr",
  "atk",
  "cups",
  "dbus",
  "expat",
  "fontconfig",
  "freetype",
  "glib",
  "gtk3",
  "mesa",
  "pango",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXcursor",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXi",
  "xorg.libXrandr",
  "xorg.libXrender",
  "xorg.libXtst",
  "xorg.libxkbfile",
  "alsa-lib",
]

[phases.install]
cmds = [
  "npm ci",
  "npx playwright install chromium --with-deps",
]

[phases.build]
cmds = []

[start]
cmd = "npm start"
