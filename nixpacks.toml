# nixpacks.toml — Railway build config
# Устанавливает системные зависимости Chromium для Playwright

[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "nss",
  "atk",
  "at-spi2-atk",
  "gtk3",
  "libxkbcommon",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "xorg.libXcursor",
  "xorg.libXi",
  "xorg.libXtst",
  "alsa-lib",
  "cups",
  "dbus",
  "expat",
  "libdrm",
  "mesa",
]

[phases.install]
cmds = [
  "npm install",
  "npx playwright install chromium",
]

[phases.build]
cmds = []

[start]
cmd = "npm start"
